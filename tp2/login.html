<!--	
<--Se deberá crear un archivo llamado login.html con su respectivo login.css. El 
<--		documento debe contener un formulario de login centrado que incluya:
<--		1. Logo o título de "Food Store".
<--		2. Subtítulo (ej: "Iniciar Sesión").
<--		3. Campo de email (input type="email").
<--		4. Campo de contraseña (input type="password").
		5. Botón de "Ingresar" que cambie de color al pasar el mouse.
		6. Enlace a "¿No tenés cuenta? Registrate".-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

    <form action="/procesar.php" id="login" class="form-container" method="post">
        <header>
            <h1 class="login-title">Food Store</h1>
            <h2>Iniciar Sesión</h2>
        </header>

        <fieldset class="form-group">
            <legend>INGRESAR</legend>

            <div class="input-group">
                <label for="email">Ingrese su email:</label>
                <input type="email" id="email" name="email" class="form-input" 
                       placeholder="email de usuario" required title="ingrese su email de usuario">
            </div>

            <div class="input-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" class="form-input" 
                       placeholder="contraseña" required title="ingrese su contraseña">
            </div>
        </fieldset>

        <button type="submit" class="btn-submit">Ingresar</button>
        
        <p class="register-text">
            ¿No tenés cuenta? <a href="/procesar.php" target="_blank">Registrate</a>
        </p>

        <footer class="form-footer">
            <p>&copy; 2026 Food Store · Aldo Manfredi</p>
            <a href="https://github.com/manfredialdo/UTN-TUPaD-P3">Repositorio</a>
        </footer>
    </form>

</body>
</html>
